<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COLOR PALETTE PROJECT</title>
    <link rel="stylesheet" href="color.css" />
  </head>
  <body>
    <h1>GENERATE UNIQUE COLORS HERE</h1>
    <div class="container">
      <div id="form">
        <form>
          <p>Tell Your Preferences</p>
          <div>
            <h4>Where to use ?</h4>
            <label
              ><input type="radio" name="use" value="Background" />Backgrounds</label
            >
            <label
              ><input type="radio" name="use" value="Button" />Buttons</label
            >
            <label
              ><input type="radio" name="use" value="Branding" />Branding</label
            >
            <label
              ><input type="radio" name="use" value="Gradient" />Gradients</label
            >
            <label
              ><input type="radio" name="use" value="Text" />Text</label
            >
          </div>
          <div>
            <h4>Select color Family ?</h4>
            <label><input type="radio" name="family" value="Red" />Red</label>
            <label><input type="radio" name="family" value="Blue" />Blue</label>
            <label
              ><input type="radio" name="family" value="Green" />Green</label
            >
            <label
              ><input type="radio" name="family" value="Yellow" />Yellow</label
            >
            <label
              ><input type="radio" name="family" value="Purple" />Purple</label
            >
            <label><input type="radio" name="family" value="Teal" />Teal</label>
            <label
              ><input type="radio" name="family" value="Pastel" />Pastel</label
            >
            <label
              ><input type="radio" name="family" value="Earth" />Earth</label
            >
            <label><input type="radio" name="family" value="Neon" />Neon</label>
            <label><input type="radio" name="family" value="Warm" />Warm</label>
            <label><input type="radio" name="family" value="Cool" />Cool</label>
          </div>
          <div>
            <h4>Describe the mood or context ?</h4>
            <label><input type="radio" name="mood" value="Calm" />Calm</label>
            <label><input type="radio" name="mood" value="Angry" />Angry</label>
            <label><input type="radio" name="mood" value="Love" />Love</label>
            <label><input type="radio" name="mood" value="Joy" />Joy</label>
            <label
              ><input type="radio" name="mood" value="Mystery" />Mystery</label
            >
            <label
              ><input type="radio" name="mood" value="Energy" />Energy</label
            >
            <label
              ><input type="radio" name="mood" value="Sadness" />Sadness</label
            >
            <label><input type="radio" name="mood" value="Hope" />Hope</label>
          </div>
          <div>
            <h4>Type of shade you like ?</h4>
            <label
              ><input type="radio" name="shade" value="Light" />Lighter</label
            >
            <label
              ><input type="radio" name="shade" value="Dark" />Darker</label
            >
          </div>
        </form>
      </div>

      <div id="generate-clr">
        <div id="clr-generate">
          <h3>Color Palette</h3>
          <button class="generate">Generate</button>
        </div>

        <div id="color-box">
